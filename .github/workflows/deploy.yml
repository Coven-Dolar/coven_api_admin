name: Deploy to production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: coven-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH,VENV_PATH,DEPLOY_BRANCH,APP_SERVICE,CELERY_SERVICE,CELERY_BEAT_SERVICE
          script: |
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            export VENV_PATH="${{ secrets.VENV_PATH }}"
            export DEPLOY_BRANCH="${{ secrets.DEPLOY_BRANCH || 'master' }}"
            export APP_SERVICE="${{ secrets.APP_SERVICE || 'coven-web' }}"
            export CELERY_SERVICE="${{ secrets.CELERY_SERVICE || 'coven-celery' }}"
            export CELERY_BEAT_SERVICE="${{ secrets.CELERY_BEAT_SERVICE || 'coven-celery-beat' }}"

            cd "$DEPLOY_PATH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
